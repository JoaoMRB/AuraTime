<!-- Ringing Alarm Alert -->
<div *ngIf="isAlarmRinging()" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
  <div class="bg-slate-900 rounded-2xl p-8 shadow-2xl text-center max-w-md mx-4 text-white">
    <h2 class="text-2xl font-bold mb-4">⏰ Alarm!</h2>
    <div class="flex gap-4 justify-center">
      <button (click)="snoozeAlarm()" class="px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-semibold transition">
        Snooze
      </button>
      <button (click)="stopAlarmRinging()" class="px-6 py-3 bg-green-500 hover:bg-green-600 text-white rounded-lg font-semibold transition">
        Stop
      </button>
    </div>
  </div>
</div>

<!-- Main Panel -->
<div class="w-full h-full flex flex-col bg-gradient-to-b from-black via-slate-950 to-neutral-950 text-white">
  <!-- Header -->
  <div class="px-6 py-8 border-b border-white/10">
    <h1 class="text-3xl font-bold">⏰ Alarms</h1>
  </div>

  <!-- Content -->
  <div class="flex-1 overflow-y-auto">
    <!-- Add New Alarm -->
    <div class="px-6 py-8 border-b border-white/10">
      <h2 class="text-xl font-semibold mb-4 text-blue-300">New Alarm</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm mb-2">Label</label>
          <input type="text" [(ngModel)]="newAlarm().label" placeholder="e.g., Wake up" 
                 class="w-full px-4 py-2 rounded-lg border bg-slate-800 border-white/20 text-white focus:outline-none" />
        </div>

        <div>
          <label class="block text-sm mb-2">Time (24h)</label>
          <input type="time" [(ngModel)]="newAlarm().time" 
                 class="w-full px-4 py-2 rounded-lg border bg-slate-800 border-white/20 text-white focus:outline-none" />
        </div>

        <div>
          <label class="block text-sm mb-2">Repeat</label>
          <div class="grid grid-cols-7 gap-2">
            <button *ngFor="let day of [0,1,2,3,4,5,6]" (click)="toggleDay(day)"
                    [ngClass]="{'bg-blue-500': newAlarm().days.includes(day), 'bg-slate-700': !newAlarm().days.includes(day)}"
                    class="py-2 px-1 rounded-lg text-sm font-semibold text-white border border-white/20">
              {{dayLabels[day]}}
            </button>
          </div>
          <p class="text-xs opacity-50 mt-2">{{getDaysString(newAlarm().days)}}</p>
        </div>

        <div>
          <label class="block text-sm mb-2">Sound</label>
          <select [(ngModel)]="newAlarm().sound" class="w-full px-4 py-2 rounded-lg border bg-slate-800 border-white/20 text-white focus:outline-none">
            <option value="chime">Chime</option>
            <option value="bell">Bell</option>
            <option value="digital">Digital</option>
          </select>
        </div>

        <div>
          <label class="block text-sm mb-2">Snooze (minutes)</label>
          <input type="number" [(ngModel)]="newAlarm().snoozeMinutes" min="1" max="60" 
                 class="w-full px-4 py-2 rounded-lg border bg-slate-800 border-white/20 text-white focus:outline-none" />
        </div>

        <button (click)="addAlarm()" class="w-full py-3 rounded-lg font-semibold bg-blue-600 hover:bg-blue-700 transition">
          + Add Alarm
        </button>
      </div>
    </div>

    <!-- Alarms List -->
    <div class="px-6 py-8 space-y-4">
      <h2 class="text-xl font-semibold text-blue-300">Saved Alarms ({{alarms().length}})</h2>

      <div *ngIf="alarms().length === 0" class="text-center opacity-50 py-8">
        <p>No alarms yet</p>
      </div>

      <div *ngFor="let alarm of alarms()" class="p-4 rounded-lg border bg-white/5 border-white/10">
        <!-- Display -->
        <div *ngIf="editingId() !== alarm.id" class="flex items-start justify-between">
          <div class="flex-1">
            <div class="flex items-center gap-3 mb-2">
              <span class="text-2xl font-bold text-blue-300">{{alarm.time}}</span>
              <div>
                <h3 class="font-semibold">{{alarm.label}}</h3>
                <p class="text-xs opacity-50">{{getDaysString(alarm.days)}}</p>
              </div>
            </div>
            <div class="text-xs opacity-60">
              <p>🔔 Sound: {{alarm.sound}}</p>
              <p>⏱️ Snooze: {{alarm.snoozeMinutes}}min</p>
            </div>
          </div>

          <div class="flex gap-2 ml-4">
            <button (click)="toggleAlarm(alarm.id)"
                    [ngClass]="{'bg-green-500': alarm.enabled, 'bg-gray-700': !alarm.enabled}"
                    class="px-4 py-2 rounded-lg font-semibold text-sm text-white">
              {{alarm.enabled ? 'ON' : 'OFF'}}
            </button>
            <button (click)="startEdit(alarm)" class="px-4 py-2 rounded-lg font-semibold text-sm bg-blue-500/30 text-blue-300">
              Edit
            </button>
            <button (click)="deleteAlarm(alarm.id)" class="px-4 py-2 rounded-lg font-semibold text-sm bg-red-500/20 text-red-400">
              Delete
            </button>
          </div>
        </div>

        <!-- Edit -->
        <div *ngIf="editingId() === alarm.id && editAlarm() !== null" class="space-y-3">
          <input type="text" [(ngModel)]="editAlarm()!.label"
                 class="w-full px-3 py-2 rounded-lg border bg-slate-800 border-white/20 text-white text-sm focus:outline-none" />
          <input type="time" [(ngModel)]="editAlarm()!.time"
                 class="w-full px-3 py-2 rounded-lg border bg-slate-800 border-white/20 text-white text-sm focus:outline-none" />
          <div class="grid grid-cols-7 gap-1">
            <button *ngFor="let day of [0,1,2,3,4,5,6]" (click)="toggleEditDay(day)"
                    [ngClass]="{'bg-blue-500': isDaySelected(day, editAlarm()?.days), 'bg-slate-700': !isDaySelected(day, editAlarm()?.days)}"
                    class="py-1 px-1 rounded text-xs font-semibold text-white border border-white/20">
              {{dayLabels[day]}}
            </button>
          </div>
          <select [(ngModel)]="editAlarm()!.sound" class="w-full px-3 py-2 rounded-lg border bg-slate-800 border-white/20 text-white text-sm focus:outline-none">
            <option value="chime">Chime</option>
            <option value="bell">Bell</option>
            <option value="digital">Digital</option>
          </select>
          <input type="number" [(ngModel)]="editAlarm()!.snoozeMinutes" min="1" max="60"
                 class="w-full px-3 py-2 rounded-lg border bg-slate-800 border-white/20 text-white text-sm focus:outline-none" />
          <div class="flex gap-2">
            <button (click)="saveEdit(alarm.id)" class="flex-1 py-2 rounded-lg font-semibold text-sm bg-green-600 hover:bg-green-700">
              Save
            </button>
            <button (click)="cancelEdit()" class="flex-1 py-2 rounded-lg font-semibold text-sm bg-white/10 hover:bg-white/20">
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
